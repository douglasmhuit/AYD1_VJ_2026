  #         EOF

  #     - name: Descargar imagenes desde DockerHub
  #       run: docker compose pull

  #     - name: Levantar servicios con docker compose
  #       run: docker compose up -d

  #     # Esperar activamente a que el backend este healthy
  #     # en lugar de un sleep fijo, que puede ser muy corto o muy largo
