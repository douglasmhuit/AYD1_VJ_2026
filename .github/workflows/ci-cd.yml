name: CI/CD AYD1 - EV - 2026

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  # TAG usa el SHA del commit para identificar unicamente cada imagen
  TAG: ${{ github.sha }}

jobs:

  # Ejecuta las pruebas unitarias del backend.
  # Corre en cualquier push o pull_request, sin importar la rama
  test:
    name: 1. Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Instalar dependencias del backend
        working-directory: ./backend
        run: npm ci

      # continue-on-error permite que el pipeline continúe aunque fallen pruebas unitarias, para que el job de reporte final pueda mostrar el resultado completo.
      - name: Ejecutar pruebas unitarias
        working-directory: ./backend
        run: npm test -- --watchAll=false --coverage
        continue-on-error: true

      - name: Mostrar resumen de pruebas
        run: |
          echo "Pruebas ejecutadas. Reporte de cobertura disponible en coverage/"

  # Construye las imagenes Docker del backend y frontend
  # y las sube a DockerHub con dos tags:
  #   - :latest        -> siempre apunta a la ultima version
  #   - :<github.sha>  -> tag unico e inmutable por commit
  #
  # Condicion: solo corre en push a main o develop (no en PRs).
  # Depende de: test
  build-and-push:
    name: 2. Build and Push a DockerHub
    runs-on: ubuntu-latest
    needs: test
    # Solo construir cuando hay un push real a main o develop
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Login a DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y subir imagen del Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          # Se suben dos tags: uno fijo (latest) y uno por commit (SHA)
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/backend-app:latest
            ${{ secrets.DOCKER_USERNAME }}/backend-app:${{ env.TAG }}
          # Cache de GitHub Actions para acelerar builds repetidos
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Construir y subir imagen del Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest
            ${{ secrets.DOCKER_USERNAME }}/frontend-app:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verificar imagenes publicadas
        run: |
          echo "Imagenes subidas a DockerHub:"
          echo "  ${{ secrets.DOCKER_USERNAME }}/backend-app:latest"
          echo "  ${{ secrets.DOCKER_USERNAME }}/backend-app:${{ env.TAG }}"
          echo "  ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest"
          echo "  ${{ secrets.DOCKER_USERNAME }}/frontend-app:${{ env.TAG }}"

  # DEPLOY (SIMULADO)
  # Descarga las imagenes desde DockerHub y levanta los contenedores
  # usando docker-compose para verificar que el despliegue funciona.
  #
  # Condicion: SOLO se ejecuta cuando el push es a main.
  # Develop solo construye y publica imagenes, no despliega.
