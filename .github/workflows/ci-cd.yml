  #           STATUS=$(docker compose ps backend | grep -o 'healthy' || echo 'not ready')
  #           if [ "$STATUS" = "healthy" ]; then
  #             echo "Backend saludable en el intento $i"
  #             break
  #           fi
  #           echo "Intento $i/20 - estado: $STATUS"
  #           sleep 5
